name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Минимальные права токена Actions: только чтение репо.
# Если позже появятся deploy-джобы (OIDC/gh-pages/…) — права поднимем точечно в них.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-build:
    name: typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Typecheck (client)
        run: npm run typecheck

      - name: Typecheck (server)
        run: npm run typecheck:server

      - name: Build (client)
        run: npm run build

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Полная история: gitleaks проверит и прошлые коммиты.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: deploy api (VPS)
    runs-on: ubuntu-latest
    needs: [typecheck-build, secret-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/nodly/app
            git fetch origin
            git checkout main
            git reset --hard origin/main
            docker compose up -d --build
            docker compose ps
