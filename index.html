    <title>Nodly — обучение ИИ в браузере</title>
    <script>
      (function () {
        try {
          var m = localStorage.getItem("nodly_theme_mode") || localStorage.getItem("noda_theme_mode");
          var mode = m === "light" || m === "dark" || m === "system" ? m : "system";
          var dark = mode === "dark";
          if (mode === "system") {
            dark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          }
          document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        } catch (e) {}
      })();
    </script>
